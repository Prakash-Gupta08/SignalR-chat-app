<!DOCTYPE html>
<html>
<head>
    <title>SignalR Chat</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        console.log("signalR loaded:", typeof signalR);
    </script>
</head>
<body>
    <h3 id="connectionId"></h3>
    <h3 id="onlineUsers"></h3>
    <input id="userName" placeholder="User Name" />
    <input id="message" placeholder="Message" />
    <button onclick="sendMessage()">
        Send
    </button>

    <ul id="messages"></ul>

    <script>

        const connection = new signalR.HubConnectionBuilder().withUrl("http://localhost:5247/chatHub").build();
        //connection.on("ReceiveMessage", (user, message, time) => {
        //    const li = document.createElement("li");
        //    li.textContent = `${user}: ${message}`;
        //    document.getElementById("messages").appendChild(li);
        //});

        //connection.on("ReceiveConnectionId", (connectionId) => {
        //    document.getElementById("connectionId").innerText =
        //        `Connection Id: ${connectionId}`;
        //});

        connection.on(
            "OnlineUsersCount",
            (count) => {

                document
                    .getElementById("onlineUsers")
                    .innerText =
                    `Online Users: ${count}`;
            });

        connection.start();


        function sendMessage() {
            const user = document.getElementById("userName").value;
            const message = document.getElementById("message").value;
            connection.invoke("SendMessage", user, message);
        }
    </script>

</body>
</html>
